services:
  backend:
    build:
      context: ./backend
    container_name: ticket-triage-backend
    ports:
      - "3000:3000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: ticket-triage-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  backend-data: